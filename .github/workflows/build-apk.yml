name: Build and Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Git Config Safe Directory
        run: git config --global --add safe.directory '*'

      - name: Install dependencies
        working-directory: ./english_dictation_flutter
        run: flutter pub get

      - name: Build APK
        working-directory: ./english_dictation_flutter
        run: flutter build apk --release --dart-define=ENCRYPTION_KEY=${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        working-directory: ./english_dictation_flutter
        run: mv build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/英语听写·艨艟战舰.apk"

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Try to create the release if it doesn't exist
          gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --notes "Release ${{ github.ref_name }}" || echo "Release already exists"
          # Upload the APK explicitly
          gh release upload ${{ github.ref_name }} "english_dictation_flutter/build/app/outputs/flutter-apk/英语听写·艨艟战舰.apk" --clobber
