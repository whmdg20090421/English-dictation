name: Build and Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Git Config Safe Directory
        run: git config --global --add safe.directory '*'

      - name: Install dependencies
        working-directory: ./english_dictation_flutter
        run: flutter pub get

      - name: Decode Keystore
        working-directory: ./english_dictation_flutter/android/app
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_B64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Error: KEYSTORE_B64 is empty. Please check your GitHub Secrets."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > upload-keystore.jks
          ls -la upload-keystore.jks

      - name: Build APK
        working-directory: ./english_dictation_flutter
        env:
          KEYSTORE_PATH: upload-keystore.jks
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release --dart-define=ENCRYPTION_KEY=${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        working-directory: ./english_dictation_flutter
        run: mv build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/英语听写·艨艟战舰.apk"

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Try to create the release if it doesn't exist
          gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --notes "Release ${{ github.ref_name }}" || echo "Release already exists"
          
          # Clean up any existing incorrectly named assets
          gh release delete-asset ${{ github.ref_name }} "default.apk" -y || true
          gh release delete-asset ${{ github.ref_name }} "英语听写·艨艟战舰.apk" -y || true
          
          # Get Release ID
          RELEASE_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}" | jq -r .id)
          
          # URL Encode filename to ensure GitHub doesn't fallback to default.apk
          ENCODED_NAME=$(jq -rn --arg x "英语听写·艨艟战舰.apk" '$x|@uri')
          
          # Upload via curl explicitly specifying the URL-encoded name
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary @"english_dictation_flutter/build/app/outputs/flutter-apk/英语听写·艨艟战舰.apk" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=$ENCODED_NAME"
