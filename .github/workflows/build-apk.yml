name: Build and Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Git Config Safe Directory
        run: git config --global --add safe.directory '*'

      - name: Install dependencies
        working-directory: ./english_dictation_flutter
        run: flutter pub get

      - name: Build APK
        working-directory: ./english_dictation_flutter
        run: flutter build apk --release --dart-define=ENCRYPTION_KEY=${{ secrets.KEY_PASSWORD }}

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ github.ref_name }} english_dictation_flutter/build/app/outputs/flutter-apk/app-release.apk --title "Release ${{ github.ref_name }}" --generate-notes
